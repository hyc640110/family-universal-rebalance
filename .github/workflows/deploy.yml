name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: |
          npm config set registry https://registry.npmjs.org/
          npm ci --include=dev --no-audit --no-fund

      - name: Verify Node/npm runtime and installed dev tooling
        run: |
          node --version
          npm --version
          npm config get omit
          test -x node_modules/.bin/tsx
          node_modules/.bin/tsx --version

      - name: Run CI regression test gate
        run: npm run test:ci

      - name: Build production Vite app
        if: github.event_name == 'push'
        run: npm run build

      - name: Build Preview Vite app
        run: npm run build:preview

      - name: Add Preview to the production Pages bundle
        if: github.event_name == 'push'
        run: |
          rm -rf ./dist/preview
          mkdir -p ./dist/preview
          cp -R ./dist-preview/. ./dist/preview/

      - name: Add nojekyll marker to the production Pages bundle
        if: github.event_name == 'push'
        run: touch ./dist/.nojekyll

      - name: Deploy production and Preview to gh-pages branch
        if: github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true

      - name: Deploy only Preview to gh-pages branch
        if: github.event_name == 'workflow_dispatch'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist-preview
          publish_branch: gh-pages
          destination_dir: preview
          keep_files: true
